<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>phosphor-android — 1512 Android Icons</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #fafafa;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
            padding-bottom: 20px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1.1em;
            color: #666;
            margin-bottom: 20px;
        }

        .credits {
            font-size: 0.9em;
            color: #999;
            margin-top: 15px;
        }

        .credits a {
            color: #667eea;
            text-decoration: none;
        }

        .credits a:hover {
            text-decoration: underline;
        }

        .controls {
            margin: 20px 0;
        }

        input[type="text"] {
            padding: 12px 16px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            transition: border-color 0.2s;
            width: 100%;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .stats {
            text-align: center;
            color: #666;
            font-size: 0.95em;
            padding: 10px;
        }

        .icon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 12px;
            margin-bottom: 40px;
        }

        .icon-card {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            position: relative;
        }

        .icon-card:hover {
            border-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
            transform: translateY(-2px);
        }

        .icon-card.hidden {
            display: none;
        }

        .icon-preview {
            width: 64px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        .icon-preview svg {
            width: 100%;
            height: 100%;
        }

        .icon-name {
            font-size: 12px;
            color: #333;
            word-break: break-word;
            font-weight: 500;
            flex: 1;
        }

        .copy-hint {
            font-size: 10px;
            color: #999;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .icon-card:hover .copy-hint {
            opacity: 1;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 12px 20px;
            border-radius: 6px;
            font-size: 14px;
            animation: slideIn 0.3s ease-out;
            z-index: 1000;
        }

        @keyframes slideIn {
            from {
                transform: translateY(100px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .no-results {
            text-align: center;
            color: #999;
            padding: 40px 20px;
            font-size: 16px;
        }

        footer {
            text-align: center;
            color: #999;
            font-size: 0.9em;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 2px solid #eee;
        }


    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎨 phosphor-android</h1>
            <p class="subtitle">1512 beautiful icons, converted to Android Vector Drawables</p>
            <div class="credits">
                Icons by <a href="https://phosphoricons.com">Phosphor Icons</a> •
                Converted by <a href="https://shreyans.co">Shreyans Jain</a> •
                <a href="https://github.com/shreyansqt/phosphor-android">GitHub</a>
            </div>
        </header>

        <div class="controls">
            <input 
                type="text" 
                id="search" 
                placeholder="Search icons by name or tags (e.g., arrow, communication)"
                autocomplete="off"
            />
        </div>

        <div class="stats">
            <span id="count">1512 icons</span>
        </div>

        <div class="icon-grid" id="grid">
                <!-- ICONS_START --></div>

        <div class="no-results" id="no-results" style="display: none;">
            No icons found. Try a different search.
        </div>

        <footer>
            MIT Licensed • Auto-synced weekly from <a href="https://github.com/phosphor-icons/core">Phosphor Icons</a>
        </footer>
    </div>

    <script>
        let allIcons = [];
        let iconMap = {}; // Map of icon name to XML content

        async function loadIconsList() {
            try {
                const response = await fetch('icons.json');
                const data = await response.json();
                allIcons = data.icons;
                await loadIconXML();
                filterIcons(); // This will render all icons and set the count
            } catch (e) {
                console.error('Failed to load icons:', e);
                document.getElementById('count').textContent = 'Error loading icons';
            }
        }

        async function loadIconXML() {
            // Load XML for all icons (lazy load in batches)
            for (const icon of allIcons) {
                try {
                    const response = await fetch(`icons/phosphor_${icon.name}.xml`);
                    if (response.ok) {
                        iconMap[icon.name] = await response.text();
                    }
                } catch (e) {
                    // Skip if not found
                }
            }
        }

        function vdToSvg(vdXml) {
            const widthMatch = vdXml.match(/android:viewportWidth="([^"]+)"/);
            const heightMatch = vdXml.match(/android:viewportHeight="([^"]+)"/);
            const viewportWidth = widthMatch ? widthMatch[1] : '256';
            const viewportHeight = heightMatch ? heightMatch[1] : '256';
            const viewBox = `0 0 ${viewportWidth} ${viewportHeight}`;

            const pathRegex = /<path\s+android:pathData="([^"]*)"\s+([^>]*)\/>/g;
            let match;
            const paths = [];

            while ((match = pathRegex.exec(vdXml)) !== null) {
                const fullAttrs = match[2];
                const pathData = match[1];
                const strokeWidthMatch = fullAttrs.match(/android:strokeWidth="([^"]+)"/);
                const strokeWidth = strokeWidthMatch ? strokeWidthMatch[1] : '16';
                const isStroke = fullAttrs.includes('android:strokeColor');

                if (isStroke) {
                    paths.push(
                        `  <path fill="none" stroke="currentColor" stroke-width="${strokeWidth}" stroke-linecap="round" stroke-linejoin="round" d="${pathData}" />`
                    );
                } else {
                    paths.push(`  <path fill="currentColor" d="${pathData}" />`);
                }
            }

            return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="${viewBox}" width="256" height="256" preserveAspectRatio="xMidYMid meet">
${paths.join('\n')}
</svg>`;
        }

        function renderGrid(icons) {
            const grid = document.getElementById('grid');
            grid.innerHTML = icons.map(icon => {
                const svg = iconMap[icon.name] ? vdToSvg(iconMap[icon.name]) : '';
                const keywords = icon.keywords.filter(kw => kw !== icon.name).join(', ');
                return `
                    <div class="icon-card" onclick="copyXML('${icon.name}')" data-name="${icon.name}" data-keywords="${keywords}">
                        <div class="icon-preview">${svg}</div>
                        <p class="icon-name">${icon.name}</p>
                        <div class="copy-hint">Click to copy XML</div>
                    </div>
                `;
            }).join('');
        }

        function copyXML(iconName) {
            const xml = iconMap[iconName];
            if (!xml) return;

            navigator.clipboard.writeText(xml).then(() => {
                showToast(`✓ Copied phosphor_${iconName}.xml`);
            });
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        function scoreMatch(icon, query) {
            if (!query) return 0;
            
            const name = icon.name.toLowerCase();
            const keywords = icon.keywords.map(k => k.toLowerCase());
            
            let score = 0;
            
            // Exact name match
            if (name === query) score += 1000;
            // Name starts with query
            else if (name.startsWith(query)) score += 500;
            // Name contains query as word boundary (after -)
            else if (name.includes('-' + query) || name.includes(query + '-')) score += 300;
            // Name contains query substring
            else if (name.includes(query)) score += 100;
            
            // Check keywords
            for (const kw of keywords) {
                if (kw === query) score += 50;
                else if (kw.startsWith(query)) score += 25;
                else if (kw.includes(query)) score += 10;
            }
            
            return score;
        }

        function filterIcons() {
            const query = document.getElementById('search').value.toLowerCase().trim();

            let filtered = allIcons;
            
            if (query) {
                // Score and filter
                const scored = allIcons.map(icon => ({
                    icon: icon,
                    score: scoreMatch(icon, query)
                })).filter(item => item.score > 0);
                
                // Sort by score (highest first)
                scored.sort((a, b) => b.score - a.score);
                filtered = scored.map(item => item.icon);
            }

            const grid = document.getElementById('grid');
            const noResults = document.getElementById('no-results');

            if (filtered.length === 0 && query) {
                grid.style.display = 'none';
                noResults.style.display = 'block';
            } else {
                grid.style.display = 'grid';
                noResults.style.display = 'none';
                renderGrid(filtered);
            }

            document.getElementById('count').textContent = `${filtered.length} icons`;
        }

        document.getElementById('search').addEventListener('input', filterIcons);

        window.addEventListener('load', loadIconsList);
    </script>
</body>
</html>
